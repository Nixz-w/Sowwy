<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do you forgive me?</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #6a1b9a; /* Deep Purple */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-color 1s ease;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            max-width: 450px;
            width: 90%;
            z-index: 1;
        }
        h1 {
            color: #4a148c;
            font-size: 1.4rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        .buttons-wrapper {
            display: flex;
            justify-content: center;
            gap: 20px;
            min-height: 50px;
        }
        .btn {
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
        #yesBtn {
            background-color: #2ecc71;
            color: white;
            transition: transform 0.2s;
        }
        #yesBtn:hover { transform: scale(1.1); }
        
        #noBtn {
            background-color: #e74c3c;
            color: white;
            position: relative;
            z-index: 999;
        }
        #message {
            display: none;
            margin-top: 10px;
        }
        .success-text {
            font-size: 1.5rem;
            color: #4a148c;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .final-text {
            font-size: 1.1rem;
            color: #4a148c;
            margin-top: 15px;
        }
        .success-gif {
            width: 100%;
            max-width: 200px;
            border-radius: 15px;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="headerText">
            Mayar sorry I overreacted and misunderstood you, you matter a lot to me and I never wanted to hurt you<br><br>
            Please forgive me :c
        </h1>
        
        <div class="buttons-wrapper" id="btnContainer">
            <button id="yesBtn" class="btn" onclick="showLove()">Yes</button>
            <button id="noBtn" class="btn" onmouseover="moveButton()" onclick="moveButton()" ontouchstart="moveButton()">No</button>
        </div>

        <div id="message">
            <div class="success-text">ilysmmmmmmm :3</div>
            <img src="https://files.catbox.moe/zijbrk.gif" alt="Forgiveness GIF" class="success-gif">
            <div class="final-text">
                 
         I'm glad we're okay now YIPPE <img src="https://cdn.discordapp.com/emojis/837740608227115059.webp?size=48&name=IchigoHappy&lossless=true" alt="Happy Emoji" class="success-img"> 
         <br>I promise to be more understanding in the future :3
            </div>
        </div>
    </div>

    <script>
        function showLove() {
            // Change background to a brighter purple
            document.body.style.backgroundColor = "#9c27b0";
            
            // Hide the header and buttons
            document.getElementById('headerText').style.display = 'none';
            document.getElementById('btnContainer').style.display = 'none';
            
            // Show the success message and gif
            document.getElementById('message').style.display = 'block';
        }

        function moveButton() {
            const btn = document.getElementById('noBtn');
            btn.style.position = 'fixed';
            
            const newX = Math.floor(Math.random() * (window.innerWidth - btn.offsetWidth));
            const newY = Math.floor(Math.random() * (window.innerHeight - btn.offsetHeight));
            
            btn.style.left = newX + 'px';
            btn.style.top = newY + 'px';
        }
    </script>
</body>
</html>
